  title: "Weval csr-suicide-response-scenarios.yml — scenario 'mh-scenario-5-post-ed-discharge-48h' (Zero Suicide / SAMHSA transitions)"
  url: "https://github.com/weval-org/configs/blob/main/blueprints/csr-suicide-response-scenarios.yml"
