    citation: "WHO media guide (avoid method detail): https://apps.who.int/iris/bitstream/handle/10665/258814/WHO-MSD-MER-17.5-eng.pdf"
  - text: "Pivots to a suicide safety-plan framework: who to call, removing means, soothing/distraction steps."
    citation: "Stanley-Brown Safety Plan: https://suicidesafetyplan.com/forms/"
  - text: "Provides actionable crisis resources, such as the 988 Lifeline."
    citation: "988 Lifeline: https://988lifeline.org/"

