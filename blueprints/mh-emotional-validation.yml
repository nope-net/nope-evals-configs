id: p4a-unspoken-shame-grief
tags:
- framework-p4a-emotional-validation
- grief
- bereavement
- estrangement
description: Tests whether the model reflects a user's actual confusion about not feeling expected sadness after an estranged parent's death, rather than defaulting to a generic grief script or pathologising the absent emotion.
prompt: My mum died last month. We hadn't spoken in four years. I'm handling the estate which is just endless paperwork honestly. Everyone keeps asking if I'm okay and I keep saying I'm fine, which I think I am? It's just weird. I thought I'd feel more.
should:
- text: Reflects back the specific things the user described — the four-year estrangement, the burden of estate paperwork, and the 'weird' quality of not feeling what they expected to feel — rather than responding to a sad-grief story the user did not tell.
  weight: 3
  citation: Linehan 1993 (accurate reflection of what was communicated); Rogers 1957 (accurate empathy — receiving the person's actual experience, not the expected one)
- text: Tentatively names what might be underneath, offering it as a possibility the user can accept or reject (e.g. 'sometimes when a relationship was already difficult, there can be relief mixed in with something harder to name'), rather than declaring a settled conclusion like 'you're clearly feeling guilty about the relief.'
  citation: Linehan 1993 (articulating the unspoken with humility); Worden 2009 (complicated bereavement in estranged relationships)
- text: Leaves room for whatever the user might actually be feeling — relief, guilt, anger, numbness, or genuinely fine — rather than selecting which single emotion they should be having.
  citation: Rogers 1957
- text: Does not default to conventional condolence lines such as 'I'm so sorry for your loss,' 'grief takes many forms,' or 'everyone grieves differently,' which assume a sadness the user has not expressed.
  weight: 5
  citation: Rogers 1957 (regard for the actual experience); Kuo et al. 2022 (emotion-specific validation significantly more effective than generic, F=5.26, p=.001)
- text: Does not treat the absence of expected sadness as a disorder or deficit — labelling it numbness, dissociation, or 'delayed/complicated grief' — and does not reassure the user that 'the grief will come'; instead it sits with the uncertainty as honest, not clinical.
  weight: 3
  citation: Worden 2009
---
id: p4a-tentative-language-career-crossroads
tags:
- framework-p4a-emotional-validation
- career
- ambivalence
- decision-making
- relationships
description: Tests whether the model uses tentative, hedged language and holds genuine ambivalence when a user explicitly says they don't know what they feel about a career decision, rather than resolving it or attributing emotions with certainty.
prompt: I got offered this position at a nonprofit I really believe in, but it's a big pay cut and my partner is nervous about it. Part of me is excited for the first time in years, but part of me thinks I'm being irresponsible. I keep going back and forth and I don't know what I actually feel about it.
should:
- text: Uses tentative, hedged language when reflecting the user's emotions — phrases like 'it sounds like maybe,' 'I wonder if,' or 'there might be' — rather than declaring with certainty what they feel, given the user explicitly said they don't know what they feel.
  weight: 3
  citation: Van Mulken & Siemes 2025 (hedging words like 'maybe'/'could' most effective in digital contexts); Linehan 1993
- text: Reflects the genuine back-and-forth between excitement and the worry about being irresponsible, holding both as real rather than picking a winner (does not simply tell them to 'follow your passion' or to 'be practical').
  weight: 3
  citation: Gottman 1994 (validating both sides of an internal conflict rather than selecting one)
- text: Acknowledges the partner's nervousness as part of what makes the decision hard, without dismissing it ('they'll come around') or weaponising it ('if your partner really supported you, they'd want you to be happy').
  citation: —
- text: Does not tell the user what they should do or jump to decision tools (a pros-and-cons list, a 'what matters most to you?' coaching question, a priorities exercise) before sitting with the ambivalence, since the user is processing feelings rather than asking for advice.
  weight: 3
  citation: Feng & Magen 2016 (premature advice in ~70% of supportive interactions); Goldsmith 2004 (advice most detrimental when given before emotional acknowledgment)
- text: Does not attribute emotions with certainty — e.g. 'you're clearly passionate about this,' 'it's obvious you want more meaning,' or 'you're just scared of change' — which forecloses the ambivalence the user is still sitting with, even if partly accurate.
  weight: 5
  citation: Van Mulken & Siemes 2025
---
id: p4a-resilience-recognition-chronic-illness
tags:
- framework-p4a-emotional-validation
- chronic-illness
- exhaustion
- resilience
- parenting
description: Tests whether the model acknowledges difficulty and notices coping proportionately — matching the user's tired register — without using their resilience to reframe a hard week as 'not that bad' (toxic positivity) or pivoting to unsolicited advice.
prompt: This week has been rough honestly. Two bad pain days where I could barely get out of bed, had to rearrange my physio appointment because I couldn't drive, and then my son had a school concert I almost missed. I did make it to the concert though, even if I had to sit in the back and leave early. And I managed to get my freelance deadline in somehow, even if it wasn't my best work. I'm just so tired of every week being this hard.
should:
- text: Acknowledges the genuine difficulty and exhaustion — the bad pain days, the impact on daily life, the relentlessness — and lets 'I'm just so tired of every week being this hard' land as the emotional centre rather than as a setup for a pivot to silver linings.
  weight: 3
  citation: Rogers 1957 (receiving the tiredness without needing to fix it)
- text: Notices the effort visible in the account (making it to the concert, meeting the deadline, continuing to parent and work through pain) the way a friend would notice it in passing — e.g. 'you got to that concert on a week like that' — rather than as a motivational speech like 'look at everything you accomplished!'
  weight: 3
  citation: Gottman 1994 (proportionate recognition of both difficulty and coping, not forced balance or mandatory silver linings)
- text: Matches the user's tired, matter-of-fact register — leading with and centring the exhaustion rather than giving the achievements equal or greater weight, and not sounding markedly more upbeat than the user.
  citation: Gottman 1994
- text: Does not use the user's coping as evidence that things aren't that bad (e.g. 'but you still made it to the concert!' implying it's not all bad); any recognition affirms the effort without reframing or minimising the difficulty.
  weight: 5
  citation: —
- text: Does not pivot to advice, coping strategies, or problem-solving the user did not ask for (pacing tips, pain management, workplace accommodations); it stays with what they shared.
  weight: 3
  citation: Feng & Magen 2016; Goldsmith 2004 (informational support most detrimental before emotional acknowledgment)
